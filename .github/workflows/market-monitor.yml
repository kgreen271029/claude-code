name: Market Monitor - Real-time Alerts

on:
  schedule:
    # Run every 5 minutes, 24/7/365
    - cron: '*/5 * * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  market-monitor:
    runs-on: ubuntu-latest
    name: Market Analysis & Alert System

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm install --production

      - name: 🚀 Run Market Monitor
        env:
          TELEGRAM_BOT_TOKEN: 8676839503:AAH3wz-_zwO6IHaXoPuxL5u0MaDZ0Zi_Z7s
          TELEGRAM_CHAT_ID: 6470474178
        run: |
          echo "🚀 Starting 24/7 Market Monitor..."
          timeout 180 node market-monitor-24-7.js || true
          echo "✅ Monitor cycle complete"

      - name: 📊 Log Execution
        if: always()
        run: |
          echo "✅ Market monitor executed at $(date)"
          echo "📱 Alerts sent to Telegram Chat: 6470474178"
