name: 24/7 Market Monitor

on:
  schedule:
    # A fresh long run every 5 hours (each run lasts ~5.5h, so coverage overlaps)
    - cron: '0 */5 * * *'
    # Backup: also try every 30 min in case a run died early
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Only one run at a time — new triggers are skipped while one is active,
# so we don't stack duplicate alerts or burn minutes.
concurrency:
  group: market-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install axios

      - name: Run market monitor (loops every 5 min for ~5.5 hours)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: timeout 20400 node market-monitor-24-7.js || true
