name: 24/7 Market Monitor

on:
  schedule:
    # Self-heal: every 15 min GitHub tries to start a run. If one is already
    # running, this one queues (concurrency keeps exactly one alive). If none
    # is running, it starts within 15 min — so it can never sit dead for long.
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: market-monitor
  cancel-in-progress: false   # never cancel a live run; queue the next one

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install axios

      - name: Run market monitor (continuous, scans every ~3 min for ~5.5h)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: timeout 20400 node market-monitor-24-7.js || true
