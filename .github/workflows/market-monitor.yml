name: 24/7 Market Monitor

on:
  schedule:
    - cron: '0 */5 * * *'
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: market-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install axios

      - name: Run market monitor (loops every 5 min for ~5.5 hours)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: timeout 20400 node market-monitor-24-7.js || true
