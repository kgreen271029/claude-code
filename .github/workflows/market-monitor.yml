name: 24/7 Market Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: market-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install axios

      - name: Run market monitor (one full cycle of all 18 sources)
        env:
          TELEGRAM_BOT_TOKEN: 8882828766:AAGalLGk4h0lkHNi2yS-Y9dsD1h6NV1XJFM
          TELEGRAM_CHAT_ID: 6470474178
        run: timeout 240 node market-monitor-24-7.js || true
