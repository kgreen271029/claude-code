name: 24/7 Market Monitor

on:
  schedule:
    # Start a fresh long run every 4 hours; each run lasts ~5.5h so coverage
    # overlaps and the next one queues seamlessly (concurrency keeps it to one).
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: market-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install axios

      - name: Run market monitor (continuous, scans every ~3 min for ~5.5h)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: timeout 20400 node market-monitor-24-7.js || true
